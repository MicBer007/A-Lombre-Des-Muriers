<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À l'Ombre des Mûriers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            line-height: 1.6;
            color: #333;
            background-color: #faf9f6;
        }

        header {
            background-color: #2d5016;
            color: #faf9f6;
            text-align: center;
            padding: 3rem 1rem;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            margin-bottom: 2rem;
        }

        section h2 {
            color: #2d5016;
            margin-bottom: 0.5rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <header>
        <h1>À l'Ombre des Mûriers</h1>
        <p>Bienvenue</p>
    </header>

    <main>
        <section>
            <h2>À propos</h2>
            <p>Contenu à venir.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 À l'Ombre des Mûriers</p>
    </footer>
</body>
</html>
